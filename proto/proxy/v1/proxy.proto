syntax = "proto3";

package proxy.v1;

option go_package = "github.com/crypto-knight/go-rpc-proxy/gen/proxy/v1;proxyv1";

service ProxyService {
    rpc Forward(ForwardRequest) returns (ForwardResponse);
}

message ForwardRequest {
  string target_service = 1;
  string method         = 2;
  bytes  payload        = 3;
}

message ForwardResponse {
  bytes  payload    = 1;
  int32  status     = 2;
  string error_msg  = 3;
}
